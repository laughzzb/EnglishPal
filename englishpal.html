<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EnglishPal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, sans-serif;
            background: #F0F0F0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        /* 顶部标题栏 */
        .header {
            background: #4A90D9;
            padding: 14px 16px;
            display: flex;
            align-items: baseline;
            gap: 16px;
        }
        .header-title { color: #fff; font-size: 18px; font-weight: bold; }
        .header-sub { color: #D0E4F7; font-size: 13px; }
        /* 聊天列表 */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        /* 消息气泡 */
        .msg {
            max-width: 80%;
            padding: 12px 14px;
            font-size: 15px;
            line-height: 1.5;
            word-break: break-word;
        }
        .msg-user {
            align-self: flex-end;
            background: #4A90D9;
            color: #fff;
            border-radius: 16px 16px 4px 16px;
        }
        .msg-ai {
            align-self: flex-start;
            background: #fff;
            color: #333;
            border-radius: 16px 16px 16px 4px;
            border: 1px solid #E8E8E8;
        }
        /* 底部输入区域 */
        .input-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: #fff;
            border-top: 1px solid #DDD;
        }
        .input-bar input {
            flex: 1;
            height: 42px;
            border: 1px solid #DDD;
            border-radius: 21px;
            padding: 0 14px;
            font-size: 15px;
            outline: none;
            background: #F5F5F5;
        }
        .input-bar button {
            width: 56px;
            height: 34px;
            border: 1px solid #CCC;
            border-radius: 17px;
            background: #fff;
            color: #333;
            font-size: 13px;
            cursor: pointer;
        }
        .input-bar button:active { background: #EEE; }
        /* 加载提示 */
        .loading {
            align-self: flex-start;
            color: #999;
            font-size: 14px;
            padding: 8px 0;
        }
    </style>
</head>
<body>

    <div class="header">
        <span class="header-title">EnglishPal</span>
        <span class="header-sub">AI 英语陪练</span>
    </div>

    <div class="chat-area" id="chatArea">
        <div class="msg msg-ai">Hello! I'm your English practice partner. What would you like to talk about today?</div>
    </div>

    <div class="input-bar">
        <input type="text" id="inputField" placeholder="输入你想说的英语话题..." />
        <button id="sendBtn">发送</button>
    </div>

    <script>
        // ===== 配置 =====
        const API_KEY = 'sk-0e6eb5a0bc3249bfa50ece029c5428da'; // 替换成你的 DeepSeek API Key

        // ===== DOM 引用 =====
        const chatArea = document.getElementById('chatArea');
        const inputField = document.getElementById('inputField');
        const sendBtn = document.getElementById('sendBtn');

        // ===== 添加消息气泡 =====
        function addMessage(text, isUser) {
            const div = document.createElement('div');
            div.className = 'msg ' + (isUser ? 'msg-user' : 'msg-ai');
            div.textContent = text;
            chatArea.appendChild(div);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        // ===== 显示加载提示 =====
        let loadingEl = null;
        function showLoading() {
            loadingEl = document.createElement('div');
            loadingEl.className = 'loading';
            loadingEl.textContent = '思考中...';
            chatArea.appendChild(loadingEl);
            chatArea.scrollTop = chatArea.scrollHeight;
        }
        function hideLoading() {
            if (loadingEl) { loadingEl.remove(); loadingEl = null; }
        }

        // ===== 调 DeepSeek API =====
        async function callDeepSeek(prompt) {
            const response = await fetch('https://api.deepseek.com/chat/completions', {
                method: 'POST',
                headers: {
                    'Authorization': 'Bearer ' + API_KEY,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    model: 'deepseek-chat',
                    messages: [
                        { role: 'system', content: '你是一个英语陪练助手。请用英语回复用户，然后用中文解释一遍。' },
                        { role: 'user', content: prompt }
                    ]
                })
            });
            const data = await response.json();
            return data.choices[0].message.content;
        }

        // ===== 发送消息 =====
        async function sendMessage() {
            const text = inputField.value.trim();
            if (!text) return;

            // 显示用户消息
            addMessage(text, true);
            inputField.value = '';
            showLoading();

            try {
                const reply = await callDeepSeek(text);
                hideLoading();
                addMessage(reply, false);
            } catch (e) {
                hideLoading();
                addMessage('错误：' + e.message, false);
            }
        }

        // ===== 事件绑定 =====
        sendBtn.addEventListener('click', sendMessage);
        inputField.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') sendMessage();
        });
    </script>

</body>
</html>
